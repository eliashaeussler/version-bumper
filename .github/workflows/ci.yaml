name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  prepare:
    name: 'Prepare workflow'
    uses: eliashaeussler/gha/.github/workflows/preparation.yaml@dc5fa2548158a3fb7537863ff248cfc98596b06a # 0.2.0

  checks:
    name: 'Checks'

    needs: [prepare]
    if: ${{ needs.prepare.outputs.continue == 'true' }}

    permissions:
      security-events: write

    uses: eliashaeussler/gha/.github/workflows/checks.yaml@dc5fa2548158a3fb7537863ff248cfc98596b06a # 0.2.0
    with:
      # We use the minimum supported PHP version
      php-version: 8.2 # renovate-ignore

  tests:
    name: 'Tests (PHP ${{ matrix.php-version }}, Composer ${{ matrix.composer-version }} & ${{ matrix.dependencies }} dependencies)'

    needs: [prepare]
    if: ${{ needs.prepare.outputs.continue == 'true' }}

    strategy:
      fail-fast: false
      matrix:
        php-version: ["8.2", "8.3", "8.4", "8.5"]
        # We test only 2.2 (LTS) and latest version, since all other versions are insecure
        composer-version: ["2.2", "2.9"]
        dependencies: ["highest", "lowest"]
        exclude:
          - php-version: "8.4"
            composer-version: "2.2"
          - php-version: "8.5"
            composer-version: "2.2"

    uses: eliashaeussler/gha/.github/workflows/composer-tests.yaml@dc5fa2548158a3fb7537863ff248cfc98596b06a # 0.2.0
    with:
      php-version: ${{ matrix.php-version }}
      composer-version: ${{ matrix.composer-version }}
      dependencies: ${{ matrix.dependencies }}

  test-coverage:
    name: 'Test coverage'

    needs: [prepare]
    if: ${{ needs.prepare.outputs.continue == 'true' }}

    uses: eliashaeussler/gha/.github/workflows/composer-test-coverage.yaml@dc5fa2548158a3fb7537863ff248cfc98596b06a # 0.2.0
