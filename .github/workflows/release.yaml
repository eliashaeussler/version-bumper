name: Release

on:
  push:
    tags:
      - '*'

jobs:
  release:
    name: 'Create release'

    permissions:
      contents: write

    uses: eliashaeussler/gha/.github/workflows/github-release.yaml@fc2d281222c21b39eb2f2d531a56c86c0e8ae76a # 0.3.1
    with:
      artifact-name: ${{ needs.assets.outputs.phar-artifact-name }}
