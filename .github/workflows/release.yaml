name: Release

on:
  push:
    tags:
      - '*'

jobs:
  release:
    name: 'Create release'

    permissions:
      contents: write

    uses: eliashaeussler/gha/.github/workflows/github-release.yaml@eb9158ad6d525752f3fb20f2d0366cdbcf8f97f6 # 0.5.5
    with:
      artifact-name: ${{ needs.assets.outputs.phar-artifact-name }}
