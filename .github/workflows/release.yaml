name: Release

on:
  push:
    tags:
      - '*'

jobs:
  release:
    name: 'Create release'

    permissions:
      contents: write

    uses: eliashaeussler/gha/.github/workflows/github-release.yaml@2d0e88cdf429b8ef1117ca8cd9d53e327340827d # 0.4.9
    with:
      artifact-name: ${{ needs.assets.outputs.phar-artifact-name }}
