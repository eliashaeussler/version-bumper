name: Release

on:
  push:
    tags:
      - '*'

jobs:
  release:
    name: 'Create release'

    permissions:
      contents: write

    uses: eliashaeussler/gha/.github/workflows/github-release.yaml@05cb9b379844348a1ad161dca85bc27ea8128427 # 0.3.6
    with:
      artifact-name: ${{ needs.assets.outputs.phar-artifact-name }}
