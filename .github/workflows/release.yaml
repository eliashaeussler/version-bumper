name: Release

on:
  push:
    tags:
      - '*'

jobs:
  release:
    name: 'Create release'

    permissions:
      contents: write

    uses: eliashaeussler/gha/.github/workflows/github-release.yaml@8797394815d38f5439d8ce0b688053c1f5755981 # 0.4.3
    with:
      artifact-name: ${{ needs.assets.outputs.phar-artifact-name }}
