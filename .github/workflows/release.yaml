name: Release
on:
  push:
    tags:
      - '*'

env:
  REF_NAME: ${{ github.ref_name }}

jobs:
  release:
    name: 'Create release'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 'Checkout'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: 'Create release'
        uses: eliashaeussler/gha/.github/actions/create-release@9d2e7a72b4a205e5415b2b6262c0af0232a1e006 # 0.1.3
        with:
          artifact-name: ${{ needs.assets.outputs.phar-artifact-name }}
